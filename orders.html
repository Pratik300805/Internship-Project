    <script src="https://kit.fontawesome.com/e526d2ada4.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="pbl_project.css">
    <style>
        body{
            background-color: #d8efe4;
        }
        .order-card {
            background-color: white;
            border-radius: 20px;
            border: 1px solid #ddd;
            padding: 20px;
            margin: 15px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .order-card img {
            width: 200px;
            border-radius: 16px;
            margin-bottom: 15px;
        }
        .order-heading {
            color: #43b213;
            font-family: "Roboto";
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
            margin-top: 100px;
        }
        .status-pending {
            color: #ffc107;
            font-weight: bold;
        }
        .status-accepted {
            color: #28a745;
            font-weight: bold;
        }
        .clear-cart-button{
            color:rgb(255, 255, 255);
            background-color: #8b803d;
            width: 130px;
            height: 45px;
            border-width: 0;
            border-radius: 8px;
            margin-right: 10px;
            margin-bottom:50px;
            margin-top:40px;
        }

        .status-rejected {
            color: #dc3545;
            font-weight: bold;
        }
        #order-items {
            display: flex;
            flex-direction: column;
            gap: 20px;
            
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#">

            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav ml-auto">
                    <a class="nav-link" href="pbl_II_project.html#section-home" id="navItem2">Home</a>
                    <a class="nav-link active" id="navItem1" href="pbl_II_project.html#whupage">
                        Why Choose Us?

                    <a class="nav-link" href="pbl_II_project.html#section-exploreMenuPage" id="navItem2">Explore Menu</a>
                    <a class="nav-link" href="pbl_II_project.html#deliveryAndPaymentSection" id="navItem3">Delivery & Payment</a>
                    <a class="nav-link" href="pbl_II_project.html#followUsSection" id="navItem4">Follow Us</a>
                    <a class="nav-link" style="font-family:Roboto; color: #dee6ed; " href="orders.html" id="navItem5">My Orders</a>
                    <a class="nav-link" href="#" onclick="goToCart()" style="color: #dee6ed;">
                        <i class="fa-solid fa-cart-shopping">Cart</i>

                   <a class="nav-link" id="authButton" href="#" onclick="logout()" style="color: #dee6ed;"><i class="fas fa-sign-out-alt"></i> Logout</a>

                </div>
            </div>
        </div>

    <h1 class="order-heading text-center">My Orders</h1>
    <div class="container">
        <div class="row d-flex flex-row justify-content-center">
            <div class="  mt-4 mb-3 ">
                <div id="order-items" class="shadow text-center "></div>
            </div>
        </div>
    </div>
    
    <div class="text-center mb-5">
        <button class="clear-cart-button">
            <a href="pbl_II_project.html" style="color: inherit; text-decoration: none;">Back to Menu</a>
        </button>
    </div>

    <!-- Add this in orders.html body -->
    <div class="modal fade" id="authModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Authentication Required</h5>
                    <button type="button" class="close" data-dismiss="modal">
                        <span>&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <p>Please login to view your orders.</p>
                    <button class="btn btn-primary" onclick="window.location.href='pbl_II_project.html'">
                        Go to Login
                    </button>
                </div>
            </div>
        </div>
    </div>

    
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
    <script src="orders.js"></script>
    <script>
        switchToSignup.addEventListener('click', () => {
            isSignUp = !isSignUp;
            authForm.querySelector('button[type="submit"]').textContent = isSignUp ? 'Sign Up' : 'Login';
            switchToSignup.textContent = isSignUp ? 'Already have an account? Login' : 'Don\'t have an account? Sign Up';
        });
    </script>
